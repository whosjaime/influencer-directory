name: YouTube Creator Scraper

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Creator search profile
        required: false
        default: all
      monday_limit:
        description: Max leads to create in Monday for this run
        required: false
        default: "25"
      pages_per_query:
        description: YouTube search pages per query
        required: false
        default: "1"
      recent_videos:
        description: Recent videos to inspect per channel
        required: false
        default: "3"
      min_score:
        description: Minimum fit score
        required: false
        default: "40"

  schedule:
    - cron: "0 15 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set scraper defaults
        run: |
          echo "SCRAPER_PROFILE=${{ github.event.inputs.profile || 'all' }}" >> $GITHUB_ENV
          echo "SCRAPER_MONDAY_LIMIT=${{ github.event.inputs.monday_limit || '25' }}" >> $GITHUB_ENV
          echo "SCRAPER_PAGES_PER_QUERY=${{ github.event.inputs.pages_per_query || '1' }}" >> $GITHUB_ENV
          echo "SCRAPER_RECENT_VIDEOS=${{ github.event.inputs.recent_videos || '3' }}" >> $GITHUB_ENV
          echo "SCRAPER_MIN_SCORE=${{ github.event.inputs.min_score || '40' }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: youtube_creator_scraper
        run: pip install -r requirements.txt

      - name: Run YouTube scraper and push to Monday
        working-directory: youtube_creator_scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          MONDAY_GROUP_ID: ${{ secrets.MONDAY_GROUP_ID }}
        run: |
          python -m src.youtube_creator_scraper.cli \
            --profile "$SCRAPER_PROFILE" \
            --pages-per-query "$SCRAPER_PAGES_PER_QUERY" \
            --recent-videos "$SCRAPER_RECENT_VIDEOS" \
            --min-score "$SCRAPER_MIN_SCORE" \
            --push-monday \
            --monday-limit "$SCRAPER_MONDAY_LIMIT"
