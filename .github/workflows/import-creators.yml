name: Import Creators to monday

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      file_path:
        description: CSV file to import
        required: true
        default: data/sample_creators.csv
      group:
        description: monday group key
        required: true
        default: new_leads
      min_fit_score:
        description: Minimum TikTok/Shorts fit score
        required: true
        default: "70"
      skip_fit_filter:
        description: Skip TikTok/Shorts fit filter
        required: true
        type: boolean
        default: false
      skip_dedupe:
        description: Skip monday duplicate check
        required: true
        type: boolean
        default: false

jobs:
  import-creators:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import creators to monday
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
          MONDAY_BOARD_ID: ${{ vars.MONDAY_BOARD_ID || '18416535896' }}
          MONDAY_DEFAULT_GROUP_ID: ${{ vars.MONDAY_DEFAULT_GROUP_ID || 'group_mm41wfhq' }}
          INPUT_FILE_PATH: ${{ github.event.inputs.file_path || 'data/sample_creators.csv' }}
          INPUT_GROUP: ${{ github.event.inputs.group || 'new_leads' }}
          INPUT_MIN_FIT_SCORE: ${{ github.event.inputs.min_fit_score || '70' }}
          INPUT_SKIP_FIT_FILTER: ${{ github.event.inputs.skip_fit_filter || 'false' }}
          INPUT_SKIP_DEDUPE: ${{ github.event.inputs.skip_dedupe || 'false' }}
        run: |
          COMMAND="python src/import_creators.py --file '$INPUT_FILE_PATH' --group '$INPUT_GROUP' --min-fit-score '$INPUT_MIN_FIT_SCORE'"

          if [ "$INPUT_SKIP_FIT_FILTER" = "true" ]; then
            COMMAND="$COMMAND --skip-fit-filter"
          fi

          if [ "$INPUT_SKIP_DEDUPE" = "true" ]; then
            COMMAND="$COMMAND --skip-dedupe"
          fi

          echo "Running: $COMMAND"
          eval "$COMMAND"
