name: Run Creator Discovery to monday

on:
  workflow_dispatch:
    inputs:
      search:
        description: "Search keyword, hashtag, niche, or creator category"
        required: true
        default: "US based entertainment comedy skits pranks challenges happy energetic creator"
      niche:
        description: "monday niche label"
        required: false
        default: "Entertainment"
      location:
        description: "Location tag to apply in monday"
        required: true
        default: "United States"
      max_creators_per_platform:
        description: "Maximum creators to add per platform"
        required: true
        default: "100"
      creator_gender:
        description: "Gender tag to apply to this search batch"
        required: true
        default: "Man"
      group:
        description: "monday group key"
        required: true
        default: "new_leads"

jobs:
  run-creator-discovery-to-monday:
    runs-on: ubuntu-latest

    env:
      MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
      MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_INSTAGRAM_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_ACTOR_ID }}
      APIFY_TIKTOK_ACTOR_ID: ${{ secrets.APIFY_TIKTOK_ACTOR_ID }}
      MONDAY_BOARD_ID: 18416535896
      MONDAY_DEFAULT_GROUP_ID: group_mm41wfhq

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search TikTok first and send to monday
        run: |
          python src/apify_social_discovery.py \
            --platform "tiktok" \
            --search "${{ github.event.inputs.search }}" \
            --niche "${{ github.event.inputs.niche }}" \
            --location "${{ github.event.inputs.location }}" \
            --max-creators "${{ github.event.inputs.max_creators_per_platform }}" \
            --creator-gender "${{ github.event.inputs.creator_gender }}" \
            --group "${{ github.event.inputs.group }}"

      - name: Search Instagram second and send to monday
        run: |
          python src/apify_social_discovery.py \
            --platform "instagram" \
            --search "${{ github.event.inputs.search }}" \
            --niche "${{ github.event.inputs.niche }}" \
            --location "${{ github.event.inputs.location }}" \
            --max-creators "${{ github.event.inputs.max_creators_per_platform }}" \
            --creator-gender "${{ github.event.inputs.creator_gender }}" \
            --group "${{ github.event.inputs.group }}"
